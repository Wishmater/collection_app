name: collection_app
description: An app to manage collections of images or other file types, with advanced tagging and rating systems.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: "^3.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  from_zero_ui:
    path: ../../from_zero_ui/

  # * Language Extensions
  dartx: ^1.2.0

  # * State Management
  go_router: 10.0.0
  flutter_riverpod: ^2.0.0-dev.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  isar: ^3.0.0-dev.13
  isar_flutter_libs: ^3.0.0-dev.13
  built_collection: ^5.1.1
  built_value: ^8.4.0

  # * Widgets / UI
  flutter_font_icons: ^2.2.7
  animations: ^2.0.7
  multi_value_listenable_builder: ^0.0.2
  sliver_tools: ^0.2.12
  preload_page_view: ^0.2.0

  # * Plugins
  url_launcher: ^6.1.12
  open_file: ^3.2.1
  path_provider: ^2.0.11
  file_picker: ^5.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.11
  isar_generator: ^3.0.0-dev.8
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1 # to run:  flutter pub run flutter_launcher_icons:main
  flutter_native_splash: ^2.3.2 # to run:  flutter pub run flutter_native_splash:create


dependency_overrides:
  win32: 5.0.6 # force older plugins (bitsdojo_window 0.1.5) to use a newer version, required by other plugins (file_picker>=5.3.2)
  http: ^1.0.0 # dcli depends on http 0.13.5 for some reason


flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "logo.png"

flutter_native_splash:
  color: "#000064"
  #  color_dark: "#121212"
  image: "assets/images/mpg_cuba_inverse.png"
  android: true
  web: true
  ios: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
