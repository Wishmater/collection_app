name: collection_app
description: An app to manage collections of images or other file types, with advanced tagging and rating systems.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: ">=2.17.5 <3.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  from_zero_ui:
    path: ../from_zero_ui/

  # * Language Extensions
  dartx: ^1.1.0

  # * State Management
  go_router: ^4.0.0
  flutter_riverpod: ^2.0.0-dev.9
  hive: ^2.2.2
  hive_flutter: ^1.1.0
  isar: ^3.0.0-dev.8
  isar_flutter_libs: ^3.0.0-dev.8
  built_collection: ^5.1.1
  built_value: ^8.4.0

  # * Widgets / UI
  flutter_icons: ^1.1.0
  animations: ^2.0.3
  multi_value_listenable_builder: ^0.0.2
  sliver_tools: ^0.2.7

  # * Plugins
  url_launcher: ^6.1.3
  open_file: ^3.2.1
  path_provider: ^2.0.11
  file_picker: ^4.6.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.11
  isar_generator: ^3.0.0-dev.8
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.9.3  # flutter pub run flutter_launcher_icons:main
  flutter_native_splash: ^2.2.3+1  # flutter pub run flutter_native_splash:create


dependency_overrides:
  xml: ^6.1.0
  meta: ^1.8.0
  platform: ^3.1.0
  ffi: ^2.0.0
  bitsdojo_window:
    git:
      url: https://github.com/Wishmater/bitsdojo_window_windows_7_support.git
      ref: master
      path: bitsdojo_window
  bitsdojo_window_windows:
    git:
      url: https://github.com/Wishmater/bitsdojo_window_windows_7_support.git
      ref: master
      path: bitsdojo_window_windows


flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
