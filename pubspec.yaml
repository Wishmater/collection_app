name: collection_app
description: File collection manager app, initially for images, but could expand to other file types.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: "^3.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  from_zero_ui:
    path: ../from_zero_ui/

  # * Language Extensions
  intl: ^0.18.1
  dartx: ^1.2.0
  string_similarity: ^2.0.0

  # * State Management
  go_router: 10.0.0
  flutter_riverpod:
    2.0.0-dev.9 # can't update until cacheTime is re-added, lots of potential bugs to be fixed with this update
  # when updating, also try https://pub.dev/packages/riverpod_lint and https://pub.dev/packages/riverpod_generator
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: 2.3.2

  # * Widgets / UI
  flutter_font_icons: ^2.2.7
  animations: ^2.0.7
  auto_size_text: ^3.0.0
  sliver_tools: ^0.2.12
  multi_value_listenable_builder: ^0.0.2
  crop_your_image: ^0.7.5
  flutter_staggered_grid_view: ^0.7.0

  # * Plugins
  url_launcher: ^6.1.12
#  image_picker: ^1.0.2
  device_info_plus: ^9.0.3
  bitsdojo_window: ^0.1.5 # ideally, we would do all window-related stuff with window_manager, and remove this dependency here
  window_manager: ^0.3.5
  video_player_win: 2.3.10
  resolve_windows_shortcut: ^2.0.0

  # * Specific Utility
  dio: ^5.3.2
  dio_smart_retry: ^5.0.0
  uuid: 4.1.0
  mlog:
    git:
      url: https://github.com/ross96D/mlog
      ref: 930195d75698fab1b1d4bc38776714457665ccdd


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  custom_lint:
  restrict_imports_linter:
    path: ../restrict_imports_linter/
  flutter_launcher_icons: ^0.13.1 # to run:  flutter pub run flutter_launcher_icons:main
  flutter_native_splash: ^2.3.2 # to run:  flutter pub run flutter_native_splash:create
  sqflite_common_ffi: 2.3.0


dependency_overrides:
  win32: ^5.0.6 # force older plugins (bitsdojo_window 0.1.5) to use a newer version, required by other plugins (file_picker>=5.3.2)
  http: ^1.0.0 # dcli depends on http 0.13.5 for some reason


flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "logo.png"

flutter_native_splash:
  color: "#000064"
  #  color_dark: "#121212"
  image: "assets/images/mpg_cuba_inverse.png"
  android: true
  web: true
  ios: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages